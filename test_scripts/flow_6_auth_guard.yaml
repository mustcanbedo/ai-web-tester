# 流程六：认证守卫验证
# 验证未登录状态下的页面保护和登录后跳转

flow: "流程六：认证守卫验证"
precondition: "user_logged_in"

steps:
  # ============================================================
  # 6.1 未登录访问受保护页面（首次访问/刷新）
  # ============================================================
  - id: "6.1.1"
    name: "清除登录态"
    action: execute_js
    params:
      expression: "localStorage.removeItem('token'); localStorage.removeItem('user');"

  - id: "6.1.2"
    name: "访问受保护页面"
    action: navigate
    params:
      url: "{base_url}/datasets/list"

  - id: "6.1.3"
    name: "等待重定向"
    action: wait
    params:
      ms: 3000

  - id: "6.1.4"
    name: "验证被重定向到首页并弹出登录弹窗"
    action: snapshot
    verify:
      - type: ai_judge
        question: "当前 URL 是否为首页（/）或不再包含 /datasets/list？页面是否弹出了登录弹窗（包含'欢迎来到 MindCloudX AI'或'登录/注册'字样）？"

  - id: "6.1.5"
    name: "验证 login_redirect 已存储"
    action: execute_js
    params:
      expression: "sessionStorage.getItem('login_redirect')"
    verify:
      - type: ai_judge
        question: "execute_js 的返回结果是否包含 '/datasets/list'？这表示系统正确存储了登录前的目标页面。"

  # ============================================================
  # 6.4 Token 失效自动登出
  # ============================================================
  - id: "6.4.1"
    name: "设置无效 token"
    action: execute_js
    params:
      expression: "localStorage.setItem('token', 'invalid_token_for_test');"

  - id: "6.4.2"
    name: "触发需要认证的 API（导航到项目列表）"
    action: navigate
    params:
      url: "{base_url}/datasets/list"

  - id: "6.4.3"
    name: "等待 API 响应和自动登出"
    action: wait
    params:
      ms: 5000

  - id: "6.4.4"
    name: "验证 token 已被清除（自动登出）"
    action: execute_js
    params:
      expression: "localStorage.getItem('token')"
    verify:
      - type: ai_judge
        question: "execute_js 返回结果是否为 null 或空？如果是，说明系统检测到无效 token 后正确执行了自动登出。如果仍然是 'invalid_token_for_test'，说明自动登出未触发。"

  # ============================================================
  # 恢复登录态（为后续流程做准备）
  # ============================================================
  - id: "6.end.1"
    name: "刷新页面恢复 cookies 登录态"
    action: navigate
    params:
      url: "{base_url}/"

  - id: "6.end.2"
    name: "等待页面加载"
    action: wait
    params:
      ms: 3000

  - id: "6.end.3"
    name: "验证是否回到可用状态"
    action: snapshot
    verify:
      - type: ai_judge
        question: "页面是否正常加载？（可能需要重新登录，这是预期行为）"
