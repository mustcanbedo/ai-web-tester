# 流程二：数据集（项目）管理
# 脚本化测试 — 操作路径确定，AI 只做结果验证

flow: "流程二：数据集管理"
precondition: "user_logged_in"

steps:
  # ============================================================
  # 2.1 查看项目列表
  # ============================================================
  - id: "2.1.1"
    name: "导航到项目列表页"
    action: navigate
    params:
      url: "{base_url}/datasets/list"

  - id: "2.1.2"
    name: "等待页面加载完成"
    action: wait_for
    params:
      type: url_contains
      value: "/datasets"
      timeout: 10000
    verify:
      - type: title_contains
        expected: "项目"
      - type: element_exists
        role: heading

  - id: "2.1.3"
    name: "验证项目卡片列表已加载"
    action: wait
    params:
      ms: 2000
    verify:
      - type: text_visible
        text: "个任务"
        description: "项目卡片应显示任务数量"
      - type: elements_count_gte
        role: clickable
        min: 1
        description: "应至少有一个可点击的项目卡片"

  # ============================================================
  # 2.1 搜索功能
  # ============================================================
  - id: "2.1.4"
    name: "找到搜索框并输入关键词"
    action: find_and_fill
    params:
      strategy: by_role
      role: searchbox
      fallback_role: textbox
      fallback_name_contains: "搜索"
      text: "test"

  - id: "2.1.5"
    name: "等待搜索防抖生效"
    action: wait
    params:
      ms: 1500

  - id: "2.1.6"
    name: "验证搜索结果"
    action: snapshot
    verify:
      - type: ai_judge
        question: "页面是否显示了搜索结果（可能是筛选后的项目列表，也可能显示无结果提示）？搜索框中是否有'test'关键词？"

  - id: "2.1.7"
    name: "清空搜索框恢复完整列表"
    action: find_and_fill
    params:
      strategy: by_role
      role: searchbox
      fallback_role: textbox
      fallback_name_contains: "搜索"
      text: ""

  - id: "2.1.8"
    name: "等待列表恢复"
    action: wait
    params:
      ms: 1500

  # ============================================================
  # 2.3 重命名项目
  # ============================================================
  - id: "2.3.1"
    name: "找到项目卡片的菜单按钮（···）并点击"
    action: find_and_click
    params:
      strategy: card_menu_button
      exclude_text: "projectId=25"
      description: "找非 projectId=25 的项目卡片上的菜单按钮"

  - id: "2.3.2"
    name: "验证 Popover 菜单弹出"
    action: wait
    params:
      ms: 500
    verify:
      - type: text_visible
        text: "重命名"
      - type: text_visible
        text: "删除"

  - id: "2.3.3"
    name: "点击重命名选项"
    action: find_and_click
    params:
      strategy: by_text
      text: "重命名"
      role: menuitem

  - id: "2.3.4"
    name: "验证重命名对话框弹出"
    action: wait
    params:
      ms: 500
    verify:
      - type: text_visible
        text: "重命名项目"
      - type: element_exists
        role: textbox

  - id: "2.3.5"
    name: "修改项目名称"
    action: find_and_fill
    params:
      strategy: by_role
      role: textbox
      text: "renamed_by_test_{timestamp}"

  - id: "2.3.6"
    name: "点击确认按钮"
    action: find_and_click
    params:
      strategy: by_text
      text: "确认"
      role: button

  - id: "2.3.7"
    name: "验证重命名成功"
    action: wait
    params:
      ms: 1000
    verify:
      - type: ai_judge
        question: "页面是否显示了'重命名成功'的 toast 提示？对话框是否已关闭？"

  # ============================================================
  # 2.3.8 把名称改回去（避免污染数据）
  # ============================================================
  - id: "2.3.8"
    name: "再次点击菜单按钮准备恢复名称"
    action: find_and_click
    params:
      strategy: card_menu_button
      name_contains: "renamed_by_test"
      description: "找到刚改名的项目卡片的菜单按钮"

  - id: "2.3.9"
    name: "点击重命名"
    action: find_and_click
    params:
      strategy: by_text
      text: "重命名"
      role: menuitem

  - id: "2.3.10"
    name: "恢复原名称"
    action: find_and_fill
    params:
      strategy: by_role
      role: textbox
      text: "test-project-auto"

  - id: "2.3.11"
    name: "确认恢复"
    action: find_and_click
    params:
      strategy: by_text
      text: "确认"
      role: button

  - id: "2.3.12"
    name: "验证恢复成功"
    action: wait
    params:
      ms: 1000
    verify:
      - type: ai_judge
        question: "页面是否显示了'重命名成功'的提示？"

  # ============================================================
  # 2.4 删除项目 — 仅验证对话框弹出，不真删
  # ============================================================
  - id: "2.4.1"
    name: "点击项目菜单按钮"
    action: find_and_click
    params:
      strategy: card_menu_button
      exclude_text: "projectId=25"

  - id: "2.4.2"
    name: "点击删除选项"
    action: find_and_click
    params:
      strategy: by_text
      text: "删除"
      role: menuitem

  - id: "2.4.3"
    name: "验证删除确认对话框"
    action: wait
    params:
      ms: 500
    verify:
      - type: text_visible
        text: "删除"
      - type: ai_judge
        question: "是否弹出了删除确认对话框？对话框中是否有'取消'和'删除'按钮？"

  - id: "2.4.4"
    name: "点击取消（不真删）"
    action: find_and_click
    params:
      strategy: by_text
      text: "取消"
      role: button

  - id: "2.4.5"
    name: "验证对话框已关闭"
    action: wait
    params:
      ms: 500
    verify:
      - type: text_not_visible
        text: "确定要删除"
        description: "删除对话框应已关闭"

  # ============================================================
  # 2.5 进入项目详情（训练任务列表）
  # ============================================================
  - id: "2.5.1"
    name: "点击项目卡片进入详情"
    action: find_and_click
    params:
      strategy: by_role
      role: clickable
      exclude_text: "projectId=25"
      index: 0
      description: "点击第一个非禁止的项目卡片"

  - id: "2.5.2"
    name: "验证进入训练任务列表页"
    action: wait
    params:
      ms: 2000
    verify:
      - type: url_contains
        value: "/training"
      - type: ai_judge
        question: "页面是否显示了训练任务列表？是否有任务类型 Tab（点云/3DGS/CAD/Mesh）？"
