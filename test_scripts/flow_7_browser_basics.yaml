# 流程七：浏览器基础信息验证
# 验证页面标题格式和 favicon

flow: "流程七：浏览器基础信息验证"
precondition: "user_logged_in"

steps:
  - id: "7.1.1"
    name: "导航到首页"
    action: navigate
    params:
      url: "{base_url}/"

  - id: "7.1.2"
    name: "验证首页标题格式"
    action: wait
    params:
      ms: 2000
    verify:
      - type: title_contains
        expected: "MindCloudX AI"

  - id: "7.1.3"
    name: "导航到项目列表页"
    action: navigate
    params:
      url: "{base_url}/datasets/list"

  - id: "7.1.4"
    name: "验证项目列表页标题"
    action: wait
    params:
      ms: 3000
    verify:
      - type: title_contains
        expected: "MindCloudX AI"
      - type: ai_judge
        question: "页面标题是否包含'项目'字样（如'项目 - MindCloudX AI'）？"

  - id: "7.1.5"
    name: "验证 favicon 存在"
    action: execute_js
    params:
      expression: "document.querySelector('link[rel*=\"icon\"]')?.getAttribute('href') || 'no favicon'"
    verify:
      - type: ai_judge
        question: "execute_js 返回的 favicon href 是否包含 'logo.svg' 或其他有效的图标路径？"
